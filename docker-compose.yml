services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      - MONGO_URI=mongodb://db:27017/mydatabase

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  db: 
    image: mongo
    ports:
      - "27017:27017"


networks:
    my-network:
     name: "my-network"