kind: Deployment
apiVersion: apps/v1
metadata: 
  name: frontend-deployment
  namespace: cloudtask
spec: 
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels: 
        app: frontend
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: frontend-image
        image: 288096932508.dkr.ecr.ap-south-1.amazonaws.com/todo-repo:frontend-9
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"