kind: Deployment
apiVersion: apps/v1
metadata:
  name: backend-deployment
  namespace: cloudtask
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: backend-image
        image: 288096932508.dkr.ecr.ap-south-1.amazonaws.com/todo-repo:backend-6
        ports:
        - containerPort: 5000
        env:
        - name: MONGO_URI
          value: mongodb://mongo-service:27017